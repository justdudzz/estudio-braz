[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/server/:splat" # Reservado caso use Netlify Functions
  status = 200

# Esta é a configuração que realmente importa para SPAs (React)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
