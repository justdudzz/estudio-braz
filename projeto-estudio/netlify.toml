# 1. Configurações de Redirecionamento (SPA Support)
# Garante que todas as rotas (/privacidade, /admin, etc.) sejam geridas pelo React.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 2. Configurações Globais de Segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Reforço da CSP (ATUALIZADA COM EMAILJS)
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https: https://www.facebook.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://stats.g.doubleclick.net https://www.facebook.com https://api.emailjs.com; frame-src 'self' https://www.google.com https://maps.google.com;"

# 3. Otimização de Cache para Imagens e Assets
# Ficheiros na pasta de galeria ou assets não mudam com frequência.
# Pedimos ao browser para guardá-los por 1 ano (Cache Imutável).
[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"