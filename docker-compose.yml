version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: studio-braz-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: braz_master_2026
      POSTGRES_DB: studio_braz
      TZ: "Europe/Lisbon" # <- ADICIONADO: Tempo de Portugal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: studio-braz-admin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@studiobraz.com
      PGADMIN_DEFAULT_PASSWORD: admin
      TZ: "Europe/Lisbon" # <- ADICIONADO: Tempo de Portugal
    ports:
      - "5050:80"
    depends_on:
      - database

volumes:
  postgres_data: